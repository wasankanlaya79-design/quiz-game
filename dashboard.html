<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>

<style>
body{
  font-family: Arial;
  background:#111;
  color:white;
  text-align:center;
}

table{
  margin:auto;
  width:80%;
  border-collapse:collapse;
}

th,td{
  padding:12px;
  border-bottom:1px solid #444;
}

.top{
  color:gold;
  font-size:20px;
}

</style>
</head>

<body>

<h1>🏆 Leaderboard</h1>

<table>
<thead>
<tr>
<th>อันดับ</th>
<th>ชื่อ</th>
<th>คะแนน</th>
<th>%</th>
</tr>
</thead>

<tbody id="board"></tbody>

</table>

<script>

const SHEET_URL = "https://opensheet.elk.sh/YOUR_SHEET_ID/Sheet1";

function loadData(){

  fetch(SHEET_URL)
  .then(res=>res.json())
  .then(data=>{

    // 🔥 เรียงคะแนน
    data.sort((a,b)=> b.คะแนน - a.คะแนน);

    let html = "";

    data.slice(0,5).forEach((row,i)=>{

      html += `
      <tr class="${i==0?'top':''}">
        <td>${i+1}</td>
        <td>${row.ชื่อ}</td>
        <td>${row.คะแนน}</td>
        <td>${row['%']}</td>
      </tr>
      `;
    });

    document.getElementById("board").innerHTML = html;

  });
}

// 🔥 realtime ทุก 2 วิ
setInterval(loadData,2000);

loadData();

</script>

</body>
</html>
